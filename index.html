function renderHome(rec, mekruh) {
return `
<!doctype html>
<html>
<head>
<title>İsfahan İlim Bahçesi</title>

<style>
body{
margin:0;
font-family:Georgia;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
color:#f8fafc;
}

header{
padding:30px;
text-align:center;
background:rgba(0,0,0,0.3);
backdrop-filter: blur(10px);
}

h1{
font-size:34px;
letter-spacing:2px;
}

.search{
width:60%;
padding:12px;
border-radius:12px;
border:none;
margin-top:10px;
}

.section{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,0.05);
padding:18px;
border-radius:14px;
text-decoration:none;
color:white;
transition:0.3s;
border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.1);
}

.mekruh{
border:1px solid orange;
}

.title{
font-size:20px;
margin-bottom:10px;
}

.badge{
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<header>
<h1>İsfahan İlim Bahçesi</h1>
<input class="search" placeholder="İslami soru ara...">
</header>

<div class="section">
<h2>📚 Önerilenler</h2>
<div class="grid">
${rec.map(x=>`
<a class="card" href="/post/${x.slug}">
<div class="title">${x.soru}</div>
<div class="badge">Ansiklopedik fetva</div>
</a>
`).join("")}
</div>
</div>

<div class="section">
<h2>⚠️ Tartışmalı Konular (Mekruh)</h2>
<div class="grid">
${mekruh.map(x=>`
<a class="card mekruh" href="/post/${x.slug}">
<div class="title">${x.soru}</div>
<div class="badge">Mekruh görüş</div>
</a>
`).join("")}
</div>
</div>

</body>
</html>
`;
}
